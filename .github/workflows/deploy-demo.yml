name: Deploy Demo

on:
  push:
    branches: [master, main, feat/*]
    paths:
      - 'template/**'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Demo to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build CLI
        run: npm run build:cli
      - name: Scaffold demo app
        working-directory: /tmp
        run: node ${{ github.workspace }}/dist/cli/index.js demo-app --preset fullstack-admin
      - name: Configure wrangler.toml
        working-directory: /tmp/demo-app
        run: sed -i 's/database_id = "".*$/database_id = "c77a8486-8aa0-45c0-a19a-8a0da73408b9"/' wrangler.toml
      - name: Install demo dependencies
        working-directory: /tmp/demo-app
        run: npm ci
      - name: Build for Cloudflare
        working-directory: /tmp/demo-app
        run: npm run build:cloudflare
      - name: Apply D1 migrations
        working-directory: /tmp/demo-app
        run: |
          for file in drizzle/0*.sql; do
            echo "Applying $file..."
            sed 's/--> statement-breakpoint//g' "$file" > /tmp/migration.sql
            npx wrangler d1 execute demo-app-db --remote --file=/tmp/migration.sql || echo "Migration $file skipped (may already exist)"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy to Cloudflare Workers
        working-directory: /tmp/demo-app
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Health Check
        run: |
          sleep 5
          curl -sf -m 30 https://demo-app.dyyz1993.workers.dev/health || echo "Health check failed (Worker may need time to propagate)"
