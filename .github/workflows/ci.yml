name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  cli-checks:
    name: CLI Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Type check CLI
        run: npm run typecheck
      - name: Lint CLI
        run: npx eslint src/ --max-warnings=0

  template-checks:
    name: Template Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root dependencies
        run: npm ci
      - name: Install template dependencies
        run: cd template && npm ci
      - name: Type check template
        run: npm run typecheck:template
      - name: Lint template
        run: npm run lint:template
      - name: Validate template
        run: npm run validate:template
      - name: Run template tests
        run: npm run test:template

  template-e2e:
    name: Template E2E Tests
    runs-on: ubuntu-latest
    needs: template-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm ci
          cd template && npm ci
      - name: Install Playwright browsers
        run: cd template && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd template && npm run test:e2e
