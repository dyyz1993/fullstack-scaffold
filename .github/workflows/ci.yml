name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  cli-checks:
    name: CLI Code Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Type check CLI
        run: npm run typecheck
      - name: Lint CLI
        run: npx eslint src/ --max-warnings=0

  cli-tests:
    name: CLI Tests & Scaffold Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: cli-checks
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run CLI unit tests
        run: npx vitest run --reporter=verbose
      - name: Scaffold E2E verify
        run: npx vitest run src/__tests__/e2e-scaffold-verify.test.ts --testTimeout=300000
        timeout-minutes: 15

  template-checks:
    name: Template Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install root dependencies
        run: npm ci
      - name: Install template dependencies
        run: cd template && npm ci
      - name: Type check template
        run: npm run typecheck:template
      - name: Lint template
        run: npm run lint:template
      - name: Validate template
        run: npm run validate:template
      - name: Run template tests
        run: npm run test:template
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: template/coverage/

  template-build:
    name: Template Build
    runs-on: ubuntu-latest
    needs: template-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: cd template && npm ci
      - name: Build template
        run: cd template && npm run build
      - name: Verify build output
        run: test -d template/dist && echo "Build succeeded" || (echo "Build failed - no dist directory" && exit 1)

  template-e2e:
    name: Template E2E Tests
    runs-on: ubuntu-latest
    needs: template-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: |
          npm ci
          cd template && npm ci
      - name: Install Playwright browsers
        run: cd template && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd template && npx playwright test --project=chromium

  template-e2e-cross-browser:
    name: Template E2E Cross-Browser
    runs-on: ubuntu-latest
    needs: template-checks
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: |
          npm ci
          cd template && npm ci
      - name: Install Playwright browsers
        run: cd template && npx playwright install --with-deps
      - name: Run E2E tests on Firefox & WebKit
        run: cd template && npx playwright test --project=firefox --project=webkit

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Audit root dependencies
        run: npm audit --production || true
      - name: Audit template dependencies
        run: cd template && npm ci && npm audit --production || true

  feishu-notify:
    name: Feishu Notification
    if: always() && github.actor != 'dependabot[bot]'
    needs: [cli-checks, cli-tests, template-checks, template-build, template-e2e, template-e2e-cross-browser, security-audit]
    uses: dyyz1993/ci-tools/.github/workflows/feishu-notify.yml@main
    with:
      jobs: '{"cli-checks":"${{ needs.cli-checks.result }}","cli-tests":"${{ needs.cli-tests.result }}","template-checks":"${{ needs.template-checks.result }}","template-build":"${{ needs.template-build.result }}","template-e2e":"${{ needs.template-e2e.result }}","template-e2e-cross-browser":"${{ needs.template-e2e-cross-browser.result }}","security-audit":"${{ needs.security-audit.result }}"}'
      sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
      actor: ${{ github.actor }}
      repo: ${{ github.repository }}
      run-id: ${{ github.run_id }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
