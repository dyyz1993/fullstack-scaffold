name: CI

on:
  push:
    branches: [master, main, feat/*]
  pull_request:
    branches: [master, main, feat/*]
  schedule:
    - cron: '0 6 * * 1'  # 每周一早上6点UTC运行
  workflow_dispatch:  # 允许手动触发

jobs:
  cli-checks:
    name: CLI Code Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Type check CLI
        run: npm run typecheck
      - name: Lint CLI
        run: npx eslint src/ --max-warnings=0
      - name: Run all validators
        run: npm run validate:all
      - name: Check framework modifications
        run: npm run framework:check

  cli-tests:
    name: CLI Tests & Scaffold Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Run CLI unit tests
        run: npx vitest run --reporter=verbose --config vitest.config.ts
      - name: Scaffold E2E verify
        run: npx vitest run src/__tests__/e2e-scaffold-verify.test.ts --testTimeout=300000
        timeout-minutes: 15
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

  template-checks:
    name: Template Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: cd template && npx tsc --noEmit
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
      - name: Lint
        run: npx turbo lint --filter=biomimic-todo-app
      - name: Unit tests
        run: npx turbo test --filter=biomimic-todo-app
      - name: Validate modules
        run: npm run validate:modules --workspace=biomimic-todo-app
      - name: Integration tests
        run: npm run test:integration --workspace=biomimic-todo-app
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: template/coverage/

  template-build:
    name: Template Build
    runs-on: ubuntu-latest
    needs: template-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build template
        run: npx turbo build --filter=biomimic-todo-app
      - name: Verify build output
        run: test -d template/dist && echo "Build succeeded" || (echo "Build failed - no dist directory" && exit 1)

  template-e2e:
    name: Template E2E Tests
    runs-on: ubuntu-latest
    needs: template-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('template/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: cd template && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd template && npx playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ strategy.job-index }}
          path: |
            template/playwright-report/
            template/playwright-artifacts/
            template/test-results/
          retention-days: 14

  template-e2e-cross-browser:
    name: Template E2E Cross-Browser
    runs-on: ubuntu-latest
    needs: template-checks
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('template/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: cd template && npx playwright install --with-deps
      - name: Run E2E tests on Firefox & WebKit
        run: cd template && npx playwright test --project=firefox --project=webkit
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-cross-browser-${{ strategy.job-index }}
          path: |
            template/playwright-report/
            template/playwright-artifacts/
            template/test-results/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Audit root dependencies
        run: npm audit --audit-level=high --production
      - name: Audit template dependencies
        run: cd template && npm ci && npm audit --audit-level=high --production

  template-modules:
    name: Template Module Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install template dependencies
        run: cd template && npm ci
      - name: Validate module manifests
        run: cd template && npx tsx src/server/core/module-loader.ts

  preset-build-matrix:
    name: Preset Build (${{ matrix.preset }})
    runs-on: ubuntu-latest
    needs: [cli-checks, cli-tests]
    strategy:
      matrix:
        preset: [minimal, todo-app, ecommerce, xbrowser-marketplace, fullstack-admin, forum, saas]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - name: Scaffold project with ${{ matrix.preset }} preset
        run: npx tsx src/index.ts test-preset-build --preset ${{ matrix.preset }} --output-dir /tmp/preset-build-${{ matrix.preset }}
      - name: Install scaffolded dependencies
        run: cd /tmp/preset-build-${{ matrix.preset }} && npm install
      - name: Type check scaffolded project
        run: cd /tmp/preset-build-${{ matrix.preset }} && npx tsc --noEmit
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
      - name: Build scaffolded project
        run: cd /tmp/preset-build-${{ matrix.preset }} && npm run build

  e2e-tests:
    name: E2E Tests (Shanbox)
    runs-on: ubuntu-latest
    needs: [cli-checks, cli-tests]
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test tests/e2e/*-preset.spec.ts --project=chromium --reporter=list --timeout=60000
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            playwright-artifacts/
            test-results/
          retention-days: 7

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/
          retention-days: 30

  feishu-notify:
    name: Feishu Notification
    if: always() && github.actor != 'dependabot[bot]'
    needs: [cli-checks, cli-tests, template-checks, template-build, template-e2e, template-e2e-cross-browser, security-audit, template-modules, preset-build-matrix, e2e-tests]
    uses: dyyz1993/ci-tools/.github/workflows/feishu-notify.yml@main
    with:
      jobs: '{"cli-checks":"${{ needs.cli-checks.result }}","cli-tests":"${{ needs.cli-tests.result }}","template-checks":"${{ needs.template-checks.result }}","template-build":"${{ needs.template-build.result }}","template-e2e":"${{ needs.template-e2e.result }}","template-e2e-cross-browser":"${{ needs.template-e2e-cross-browser.result }}","security-audit":"${{ needs.security-audit.result }}","template-modules":"${{ needs.template-modules.result }}","preset-build-matrix":"${{ needs.preset-build-matrix.result }}","e2e-tests":"${{ needs.e2e-tests.result }}"}'
      sha: ${{ github.sha }}
      ref: ${{ github.ref_name }}
      actor: ${{ github.actor }}
      repo: ${{ github.repository }}
      run-id: ${{ github.run_id }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
