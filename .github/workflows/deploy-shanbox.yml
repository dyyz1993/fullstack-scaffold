name: Deploy Shanbox

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NPM version to deploy (e.g., 0.4.23)'
        required: true
        type: string
      presets:
        description: 'Comma-separated presets to deploy (empty = all)'
        required: false
        type: string
        default: 'todo-app,minimal,ecommerce,xbrowser-marketplace,fullstack-admin,forum,saas'

jobs:
  deploy:
    name: Deploy Presets to Shanbox
    runs-on: ubuntu-latest
    environment: shanbox

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SHANBOX_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2200 192.168.0.29 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install create-fullstack-scaffold
        run: |
          ssh shanbox 'npm uninstall -g create-fullstack-scaffold 2>/dev/null; rm -rf ~/.npm/_npx/; npm install -g create-fullstack-scaffold@${{ inputs.version }} 2>&1 | tail -3'
          ssh shanbox 'node -e "console.log(require(\"/usr/lib/node_modules/create-fullstack-scaffold/package.json\").version)"'

      - name: Kill existing processes
        run: |
          ssh shanbox 'for port in 3011 3013 3014 3015 3016 3018 3020; do pid=$(ss -tlnp | grep ":$port " | grep -oP "pid=\K[0-9]+" | head -1); [ -n "$pid" ] && kill $pid 2>/dev/null; done; echo "All killed"'

      - name: Deploy todo-app
        if: contains(inputs.presets, 'todo-app')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/todo-app/.env ] && cp /root/todo-app/.env /root/env-backup/todo-app.env || true'
          ssh shanbox 'rm -rf /tmp/gen-todo && mkdir -p /tmp/gen-todo && cd /tmp/gen-todo && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js todo-app --preset todo-app --no-install && rm -rf /root/todo-app && mv /tmp/gen-todo/todo-app /root/todo-app'
          ssh shanbox '[ -f /root/env-backup/todo-app.env ] && cp /root/env-backup/todo-app.env /root/todo-app/.env || true'
          ssh shanbox 'cd /root/todo-app && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/todo-app && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/todo-app && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3011 > /root/todo-app/vite.log 2>&1 &'

      - name: Deploy minimal
        if: contains(inputs.presets, 'minimal')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/minimal/.env ] && cp /root/minimal/.env /root/env-backup/minimal.env || true'
          ssh shanbox 'rm -rf /tmp/gen-minimal && mkdir -p /tmp/gen-minimal && cd /tmp/gen-minimal && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js minimal --preset minimal --no-install && rm -rf /root/minimal && mv /tmp/gen-minimal/minimal /root/minimal'
          ssh shanbox '[ -f /root/env-backup/minimal.env ] && cp /root/env-backup/minimal.env /root/minimal/.env || true'
          ssh shanbox 'cd /root/minimal && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/minimal && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/minimal && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3013 > /root/minimal/vite.log 2>&1 &'

      - name: Deploy ecommerce
        if: contains(inputs.presets, 'ecommerce')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/shop/.env ] && cp /root/shop/.env /root/env-backup/shop.env || true'
          ssh shanbox 'rm -rf /tmp/gen-ecom && mkdir -p /tmp/gen-ecom && cd /tmp/gen-ecom && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js shop --preset ecommerce --no-install && rm -rf /root/shop && mv /tmp/gen-ecom/shop /root/shop'
          ssh shanbox '[ -f /root/env-backup/shop.env ] && cp /root/env-backup/shop.env /root/shop/.env || true'
          ssh shanbox 'cd /root/shop && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/shop && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/shop && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3014 > /root/shop/vite.log 2>&1 &'

      - name: Deploy xbrowser-marketplace
        if: contains(inputs.presets, 'xbrowser-marketplace')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/plugin/.env ] && cp /root/plugin/.env /root/env-backup/plugin.env || true'
          ssh shanbox 'rm -rf /tmp/gen-plugin && mkdir -p /tmp/gen-plugin && cd /tmp/gen-plugin && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js plugin --preset xbrowser-marketplace --no-install && rm -rf /root/plugin && mv /tmp/gen-plugin/plugin /root/plugin'
          ssh shanbox '[ -f /root/env-backup/plugin.env ] && cp /root/env-backup/plugin.env /root/plugin/.env || true'
          ssh shanbox 'cd /root/plugin && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/plugin && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/plugin && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3015 > /root/plugin/vite.log 2>&1 &'

      - name: Deploy fullstack-admin
        if: contains(inputs.presets, 'fullstack-admin')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/fullstack-admin/.env ] && cp /root/fullstack-admin/.env /root/env-backup/fullstack-admin.env || true'
          ssh shanbox 'rm -rf /tmp/gen-fa && mkdir -p /tmp/gen-fa && cd /tmp/gen-fa && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js fullstack-admin --preset fullstack-admin --no-install && rm -rf /root/fullstack-admin && mv /tmp/gen-fa/fullstack-admin /root/fullstack-admin'
          ssh shanbox '[ -f /root/env-backup/fullstack-admin.env ] && cp /root/env-backup/fullstack-admin.env /root/fullstack-admin/.env || true'
          ssh shanbox 'cd /root/fullstack-admin && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/fullstack-admin && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/fullstack-admin && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3016 > /root/fullstack-admin/vite.log 2>&1 &'

      - name: Deploy forum
        if: contains(inputs.presets, 'forum')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/forum/.env ] && cp /root/forum/.env /root/env-backup/forum.env || true'
          ssh shanbox 'rm -rf /tmp/gen-forum && mkdir -p /tmp/gen-forum && cd /tmp/gen-forum && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js forum --preset forum --no-install && rm -rf /root/forum && mv /tmp/gen-forum/forum /root/forum'
          ssh shanbox '[ -f /root/env-backup/forum.env ] && cp /root/env-backup/forum.env /root/forum/.env || true'
          ssh shanbox 'cd /root/forum && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/forum && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/forum && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3018 > /root/forum/vite.log 2>&1 &'

      - name: Deploy saas
        if: contains(inputs.presets, 'saas')
        run: |
          ssh shanbox 'mkdir -p /root/env-backup && [ -f /root/saas/.env ] && cp /root/saas/.env /root/env-backup/saas.env || true'
          ssh shanbox 'rm -rf /tmp/gen-saas && mkdir -p /tmp/gen-saas && cd /tmp/gen-saas && node /usr/lib/node_modules/create-fullstack-scaffold/dist/cli/index.js saas --preset saas --no-install && rm -rf /root/saas && mv /tmp/gen-saas/saas /root/saas'
          ssh shanbox '[ -f /root/env-backup/saas.env ] && cp /root/env-backup/saas.env /root/saas/.env || true'
          ssh shanbox 'cd /root/saas && npm install --legacy-peer-deps 2>&1 | tail -2 && npx patch-package 2>&1 | tail -2'
          ssh shanbox 'cd /root/saas && npm run db:push 2>&1 | tail -2 || true'
          ssh shanbox 'cd /root/saas && rm -rf node_modules/.vite && nohup npx vite --host 0.0.0.0 --port 3020 > /root/saas/vite.log 2>&1 &'

      - name: Wait for services to start
        run: sleep 15

      - name: Health check
        run: |
          echo "=== HTTPS Health Check ==="
          for sub in todo minimal shop plugin fullstack-admin forum saas; do
            code=$(ssh shanbox "curl -sk -o /dev/null -w '%{http_code}' https://\${sub}.shanbox.19930810.xyz:8443/")
            echo "$sub: $code"
          done
          echo ""
          echo "=== API Health Check ==="
          ssh shanbox 'curl -s http://localhost:3011/api/todos | head -c 50'
          echo ""
          ssh shanbox 'curl -s http://localhost:3014/api/orders-mock | head -c 50'
          echo ""
          ssh shanbox 'curl -s http://localhost:3015/api/plugins | head -c 50'
          echo ""
          ssh shanbox 'curl -s http://localhost:3018/api/topics | head -c 50'
          echo ""
          echo "=== Deploy Complete ==="

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
