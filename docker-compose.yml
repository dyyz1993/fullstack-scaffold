  #     - POSTGRES_USER=${POSTGRES_USER:-biomimic}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  #     - POSTGRES_DB=${POSTGRES_DB:-biomimic}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - biomimic-network
  #   ports:
  #     - "${POSTGRES_PORT:-5432}:5432"

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: biomimic-redis
  #   restart: unless-stopped
  #   networks:
  #     - biomimic-network
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #   volumes:
  #     - redis-data:/data

  # Optional: Nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: biomimic-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
