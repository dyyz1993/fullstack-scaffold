name = "biomimic-todo-app"
main = "dist/cloudflare/cloudflare.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "biomimic-todo-db"
database_id = "48684115-a14b-4a35-9f2b-03cf8fa66eb6"

[[durable_objects.bindings]]
name = "REALTIME_DO"
class_name = "RealtimeDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NotificationDurableObject"]

[[migrations]]
tag = "v2"
renamed_classes = [{ from = "NotificationDurableObject", to = "RealtimeDurableObject" }]

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[dev]
port = 8787
local_protocol = "http"
