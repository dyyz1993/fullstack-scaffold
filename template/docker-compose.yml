services:
  app:
    build: .
    ports:
      - "3010:3010"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DB_DRIVER=sqlite
      - DB_PATH=/app/data/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
