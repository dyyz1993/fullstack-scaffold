# client/patterns.yml
# Module: client (UI pages)
# Proven interaction patterns

websocket_echo_flow:
  description: "Connect WebSocket, send echo message, receive response"
  steps:
    - action: navigate
      url: "/websocket"
      description: "Navigate to WebSocket page"
    - action: click
      selector: "[data-testid='connect-ws-button']"
      description: "Click Connect button"
    - action: wait
      ms: 2000
      description: "Wait for connection to establish"
    - action: fill
      selector: "[data-testid='ws-message-input']"
      value: "Hello from UI test!"
      description: "Type message"
    - action: click
      selector: "[data-testid='send-message-button']"
      description: "Click Send"
    - action: wait
      ms: 2000
      description: "Wait for echo response"
  expected_result: "Messages panel shows CONNECTED, ECHO REQUEST, and ECHO RESPONSE"

sse_notification_flow:
  description: "Connect SSE, create notification, receive via SSE"
  steps:
    - action: navigate
      url: "/notifications"
      description: "Navigate to Notifications page"
    - action: click
      selector: "[data-testid='connect-sse-button']"
      description: "Click Connect button"
    - action: wait
      ms: 2000
      description: "Wait for SSE connection"
    - action: fill
      selector: "[data-testid='notification-title-input']"
      value: "Test Notification"
      description: "Fill notification title"
    - action: fill
      selector: "[data-testid='notification-message-input']"
      value: "Test message"
      description: "Fill notification message"
    - action: click
      selector: "[data-testid='create-notification-button']"
      description: "Create notification"
    - action: wait
      ms: 2000
      description: "Wait for SSE delivery"
  expected_result: "Notification appears in list with title, message, and timestamp"

todo_form_validation:
  description: "Add Todo button is disabled until title is filled"
  steps:
    - action: navigate
      url: "/todos"
    - action: snapshot
      description: "Verify Add Todo button is disabled"
    - action: fill
      selector: "[data-testid='todo-title-input']"
      value: "Test todo"
    - action: snapshot
      description: "Verify Add Todo button is enabled"
  expected_result: "Button transitions from disabled to enabled when title is filled"

tips:
  - "Navigation links trigger client-side routing (URL changes without full reload)"
  - "WebSocket message input is disabled until connected"
  - "SSE notification form requires both title and message"
  - "Todo creation returns 401 without auth token (expected on deployed demo)"
  - "Content page uses Chinese labels"
