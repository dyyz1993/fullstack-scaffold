# Module: websocket
# Reusable operation sequences

websocket_full_flow:
  description: "Connect, send echo, send ping, disconnect"
  steps:
    - action: click
      selector: "[data-testid=connect-ws-button]"
      description: "Click Connect button"
    - action: wait
      duration: 3000
      description: "Wait for WebSocket connection"
    - action: fill
      selector: "[data-testid=ws-message-input]"
      value: "Hello Production WS"
      description: "Type echo message"
    - action: click
      selector: "[data-testid=send-message-button]"
      description: "Send echo message"
    - action: wait
      duration: 2000
      description: "Wait for echo response"
    - action: select
      selector: "[data-testid=ws-message-type-select]"
      value: "ping"
      description: "Select Ping (RPC) option"
    - action: click
      selector: "[data-testid=send-message-button]"
      description: "Send ping"
    - action: wait
      duration: 2000
      description: "Wait for pong response"
    - action: click
      selector: "[data-testid=disconnect-ws-button]"
      description: "Click Disconnect button"
  expected_result: "Status cycles through Closed -> Open -> Closed, messages accumulate"

tips:
  - "PRODUCTION BUG: autoRegisterRealtime scans OpenAPI document for WS/SSE paths, but the production build's OpenAPI document only includes /todos paths. WS paths are NOT registered."
  - "FIX: Add manual runtime.handleWS('/api/chat/ws') and runtime.handleSSE('/api/notifications/stream') in node.ts as fallback."
  - "The dev server (Vite) handles WebSocket via websocketPlugin in vite-plugins.ts, which also depends on autoRegisterRealtime."
  - "Status uses data-testid attribute: ws-status-open, ws-status-closed, ws-status-connecting"
  - "Echo RPC sends {method: 'echo', id: '<id>', params: {message: '...'}} and receives {id: '<id>', result: {message: '...', timestamp: ...}}"
  - "Ping RPC sends {method: 'ping', id: '<id>', params: {}} and receives {id: '<id>', result: {pong: true, timestamp: ...}}"
  - "Server sends 'connected' event on WS open with {type: 'connected', payload: {timestamp: ...}}"
  - "The WS endpoint path is /api/chat/ws - the client constructs ws://host/api/chat/ws"
