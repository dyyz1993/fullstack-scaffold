# Module: isr
# Site: https://demo-app.dyyz1993.workers.dev (Cloudflare), http://localhost:5175 (local dev)
# Version: 2
# Last updated: 2026-05-09
# Updated in round: r2

isr_routes:
  root:
    url: "/"
    trailing_slash: false
    title: "Biomimic App"
    has_ssr_content: false  # Only serves shell HTML, empty #root
    cf_cache: HIT
    meta_overrides: false  # No react-helmet overrides in SSR

  todos:
    url: "/todos/"
    trailing_slash: true  # Redirects 307 from /todos to /todos/
    title: "Todo List - Biomimic App"
    has_ssr_content: true
    ssr_testids:
      - "todo-page"
      - "todo-title"
      - "todo-form"
      - "todo-title-input"
      - "todo-description-input"
      - "add-todo-button"
      - "todo-list"
      - "empty-state"
    cf_cache: HIT
    meta_overrides: true
    og_title: "Todo List - Biomimic App"
    description: "Manage your todo items with full CRUD operations"

  content:
    url: "/content/"
    trailing_slash: true
    title: "内容 - Biomimic App"
    has_ssr_content: true
    ssr_testids:
      - "content-list-page"
    cf_cache: MISS then HIT
    meta_overrides: true
    og_title: "内容 - Biomimic App"
    description: "浏览最新的文章、公告、教程和新闻"

  notifications:
    url: "/notifications/"
    trailing_slash: true
    title: "Notifications - Biomimic App"
    has_ssr_content: true
    ssr_testids:
      - "notification-container"
      - "sse-status-disconnected"
      - "unread-count"
      - "connect-sse-button"
    cf_cache: MISS then HIT
    meta_overrides: true
    og_title: "Notifications - Biomimic App"
    description: "Real-time notifications powered by Server-Sent Events"

non_isr_routes:
  api_todos:
    url: "/api/todos"
    content_type: "application/json"
    returns_json: true

  health:
    url: "/health"
    content_type: "application/json"
    returns_json: true

  static_assets:
    vite_svg:
      url: "/vite.svg"
      content_type: "text/html"  # NOTE: Returns text/html, not image/svg+xml

local_dev_behavior:
  server: "Vite dev server (port 5175)"
  ssr_enabled: false
  notes:
    - "Local dev server returns SPA shell HTML only - no SSR pre-rendering"
    - "All pages get the same generic <title>Biomimic App</title>"
    - "All pages get the same generic meta tags"
    - "React Helmet overrides only work client-side (after hydration)"
    - "cf-cache-status headers not present (Cloudflare-specific)"
    - "API routes (/api/*) return JSON correctly - not intercepted"
  meta_tags_local_dev:
    title: "Biomimic App"  # generic, same for all pages
    og_title: "Biomimic App"
    description: "Biomimic App - A full-stack application template"
    og_description: "A full-stack application template with React and Hono"
  meta_tags_cloudflare:
    title: "<page-specific> - Biomimic App"
    og_title: "<page-specific> - Biomimic App"
    description: "<page-specific description>"
    data_rh: true  # react-helmet adds data-rh="true"

hydration:
  todo_page:
    client_title: "Todo List - Biomimic App"  # Set by React Helmet after hydration
    interactive_elements:
      - data-testid="todo-title-input"
      - data-testid="todo-description-input"
      - data-testid="add-todo-button"
      - data-testid="filter-all"
      - data-testid="filter-pending"
      - data-testid="filter-in-progress"
      - data-testid="filter-completed"
      - data-testid="todo-status"
    auth_required: true  # "Authentication token is required" for create operations
    type_vs_fill: "Use 'type' command, not 'fill' - React controlled components lose 'fill' value"

cache_headers:
  cf_cache_status: present on Cloudflare only
  cache_control: "public, max-age=0, must-revalidate"  # Cloudflare only
  x_isr_status: NOT PRESENT
  x_isr_headers: NOT PRESENT
