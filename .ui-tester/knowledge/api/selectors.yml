endpoints:
  health:
    method: GET
    path: /health
    expected_status: 200
    expected_body: '{"status":"ok","db":"connected"}'
  
  list_todos:
    method: GET
    path: /api/todos
    expected_status: 200
    expected_body: '{"success":true,"data":[]}'
  
  create_todo:
    method: POST
    path: /api/todos
    requires_auth: true
    expected_status_without_auth: 401
    expected_error: "Authentication token is required"
  
  list_contents:
    method: GET
    path: /api/public/contents
    expected_status: 200
    expected_body: '{"success":true,"data":{"items":[],"count":0}}'
  
  list_notifications:
    method: GET
    path: /api/notifications?unreadOnly=false
    expected_status: 200
  
  create_notification:
    method: POST
    path: /api/notifications
    expected_status: 201
  
  sse_stream:
    method: GET
    path: /api/notifications/stream
    content_type: text/event-stream
  
  websocket:
    path: /api/chat/ws
    protocol: ChatProtocolSchema
