# api/patterns.yml
# Module: api
# Proven interaction patterns

health_check:
  description: "Verify server and DB are healthy"
  steps:
    - action: curl
      method: GET
      path: /health
  expected_result: '{"status":"ok","db":"connected","timestamp":"..."}'

list_todos:
  description: "Get all todos (empty when fresh)"
  steps:
    - action: curl
      method: GET
      path: /api/todos
  expected_result: '{"success":true,"data":[],"timestamp":"..."}'

auth_check:
  description: "POST endpoints require auth token"
  steps:
    - action: curl
      method: POST
      path: /api/todos
      headers: {"Content-Type": "application/json"}
      body: '{"title":"test"}'
  expected_result: '{"success":false,"error":"Authentication token is required","status":401}'

tips:
  - "All API responses include a timestamp field"
  - "POST /api/todos returns 401 without auth"
  - "GET /api/public/contents is public (no auth needed)"
  - "Response format: {success: boolean, data: any, timestamp: string}"
