# Module: notifications
# Reusable operation sequences

sse_connect_flow:
  description: "Connect to SSE stream"
  steps:
    - action: click
      selector: "[data-testid='connect-sse-button']"
      description: "Click Connect button"
    - action: wait
      duration: 2000
      description: "Wait for SSE connection"
  expected_result: "Status changes to Connected, Disconnect button becomes enabled"
  wait_after_submit: 2000

sse_disconnect_flow:
  description: "Disconnect from SSE stream"
  steps:
    - action: click
      selector: "[data-testid='disconnect-sse-button']"
      description: "Click Disconnect button"
    - action: wait
      duration: 1000
      description: "Wait for disconnection"
  expected_result: "Status changes to Disconnected, Connect button becomes enabled"

create_notification_flow:
  description: "Create a notification via form"
  steps:
    - action: select
      selector: "[data-testid='notification-type-select']"
      value: "Info"
      description: "Select notification type"
    - action: fill
      selector: "[data-testid='notification-title-input']"
      description: "Fill notification title"
    - action: fill
      selector: "[data-testid='notification-message-input']"
      description: "Fill notification message"
    - action: click
      selector: "[data-testid='create-notification-button']"
      description: "Click Create Notification (only enabled when title+message filled)"
  expected_result: "Notification appears in list, unread count increases"
  wait_after_submit: 2000
  notes:
    - "Create Notification button is disabled until both title and message are filled"
    - "SSE must be Connected to create notifications"

mark_all_read_flow:
  description: "Mark all notifications as read"
  steps:
    - action: click
      selector: "[data-testid='mark-all-read-button']"
      description: "Click Mark All Read"
    - action: wait
      duration: 1000
      description: "Wait for state update"
  expected_result: "Unread count goes to 0"

tips:
  - "SSE status indicator uses dynamic data-testid: sse-status-connected or sse-status-disconnected"
  - "Use [data-testid^='sse-status'] to find the status element regardless of state"
  - "Connect button is disabled when Connected; Disconnect button is disabled when Disconnected"
  - "Create Notification button is disabled until both title and message inputs are filled"
  - "Notification items appear dynamically after creation"
  - "Each notification has a mark-as-read button with data-testid='mark-as-read-button'"
