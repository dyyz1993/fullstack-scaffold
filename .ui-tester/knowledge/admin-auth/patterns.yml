# Module: admin-auth
# Reusable operation sequences

login_flow_quick:
  description: "Quick login using preset button (no credentials needed)"
  steps:
    - action: open
      url: "http://localhost:5175/admin/login"
      description: "Navigate to login page"
    - action: click
      selector: 'button:has-text("superadmin")'
      description: "Click superadmin quick login button"
  expected_result: "Redirects to /admin/dashboard"

unauthenticated_redirect:
  description: "Unauthenticated access to dashboard redirects to login"
  steps:
    - action: eval
      value: "localStorage.clear(); sessionStorage.clear();"
      description: "Clear auth state"
    - action: open
      url: "http://localhost:5175/admin/dashboard"
      description: "Navigate to dashboard without auth"
  expected_result: "Redirects to /admin/login"

register_page_flow:
  description: "Navigate to register page and verify form"
  steps:
    - action: open
      url: "http://localhost:5175/admin/register"
      description: "Navigate to register page"
  expected_result: "Registration form with username, email, password, confirm password fields"

tips:
  - "Quick login buttons bypass CAPTCHA and go straight to dashboard"
  - "Login page uses data-testid attributes: admin-login-form, admin-login-username, admin-login-password, admin-login-submit"
  - "Register page uses CSS IDs: #username, #email, #password, #confirmPassword"
  - "Register page has NO data-testid attributes"
  - "Auth state stored in localStorage — clear it to test unauthenticated flows"
  - "Dashboard redirect happens client-side via React Router"
