content_list_page:
  url: "http://localhost:5175/content"
  page_container: "[data-testid='content-list-page']"
  category_buttons:
    all: "button" (text: "全部")
    article: "button" (text: "文章")
    announcement: "button" (text: "公告")
    tutorial: "button" (text: "教程")
    news: "button" (text: "新闻")
    policy: "button" (text: "政策")
  active_category_indicator: ".bg-blue-600.text-white"
  search_input: "input[placeholder='搜索内容...']"
  search_button: "button" (text: "搜索")
  content_cards: "a[href^='/content/']"
  category_badge: ".bg-blue-100.text-blue-700"
  empty_state: ".text-center .text-gray-500"

content_detail_page:
  url_pattern: "/content/{id}"
  page_container: "[data-testid='content-detail-page']"
  back_link: "a" (text: "← 返回内容列表")
  breadcrumb_link: "a" (text: "内容中心")
  content_title: "h1, h2" (main title element)
